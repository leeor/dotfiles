# =============================================================================
# tmux.conf — tmux 3.6a on macOS (Ghostty)
# =============================================================================

# ---------------------------------------------------------------------------
# Terminal & Color
# ---------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-ghostty:RGB"
set -ag terminal-overrides ",xterm-256color:RGB"

# Undercurl support (for editor diagnostics, etc.)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# ---------------------------------------------------------------------------
# General
# ---------------------------------------------------------------------------
set -sg escape-time 10          # snappy escape (tmux 3.5+ default)
set -g history-limit 50000      # generous scrollback
set -g focus-events on          # needed for editor autocommands
set -g display-time 3000        # show messages for 3s
set -g display-panes-time 1500  # pane-number overlay duration
set -g status-interval 5        # refresh status bar every 5s
set -g mouse on                 # full mouse support (click, scroll, resize)
set -g set-clipboard external   # OSC 52 clipboard (works over SSH too)
set -s copy-command 'pbcopy'    # macOS clipboard integration

# Start numbering at 1 (0 is awkward on the keyboard)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on      # close window 2? 3 becomes 2

# tmux 3.5+ features
set -g extended-keys on         # better modifier-key handling
set -g allow-passthrough on     # allow escape-sequence passthrough (images, etc.)

# ---------------------------------------------------------------------------
# Prefix
# ---------------------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix            # C-a C-a sends literal C-a

# ---------------------------------------------------------------------------
# Keybindings — Splits & Windows
# ---------------------------------------------------------------------------
# Intuitive splits (open in current directory)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window keeps current directory
bind c new-window -c "#{pane_current_path}"

# Quick config reload
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# ---------------------------------------------------------------------------
# Keybindings — Navigation
# ---------------------------------------------------------------------------
# Vim-aware pane switching (works with vim-tmux-navigator in Neovim)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"

# Restore clear-screen (since C-l is remapped)
bind C-l send-keys 'C-l'

# Shift+Arrow to switch windows (no prefix needed)
bind -n S-Left  previous-window
bind -n S-Right next-window

# Prefix + H/J/K/L to resize panes (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Swap windows left/right with Ctrl-Shift-Arrow
bind -n C-S-Left  swap-window -t -1\; select-window -t -1
bind -n C-S-Right swap-window -t +1\; select-window -t +1

# ---------------------------------------------------------------------------
# Keybindings — Sessions (fzf-powered, tmux 3.2+ popup)
# ---------------------------------------------------------------------------
# Prefix + S = fuzzy session switch
bind S display-popup -E -w 60% -h 60% "\
    tmux list-sessions -F '#{session_name}' | \
    fzf --reverse --header='Switch Session' --preview='tmux capture-pane -ep -t {}' | \
    xargs tmux switch-client -t"

# Prefix + W = fuzzy window switch
bind W display-popup -E -w 60% -h 60% "\
    tmux list-windows -F '#{window_index}: #{window_name} (#{window_panes} panes)' | \
    fzf --reverse --header='Switch Window' | \
    cut -d: -f1 | xargs tmux select-window -t"

# Prefix + P = fuzzy project session (create or attach)
bind P display-popup -E -w 60% -h 60% "\
    find ~/code ~/projects ~/work -mindepth 1 -maxdepth 1 -type d 2>/dev/null | \
    fzf --reverse --header='Open Project' | \
    xargs -I{} sh -c 'name=\$(basename {}); tmux has-session -t \$name 2>/dev/null && tmux switch-client -t \$name || (tmux new-session -ds \$name -c {} && tmux switch-client -t \$name)'"

# ---------------------------------------------------------------------------
# Vi Copy Mode
# ---------------------------------------------------------------------------
setw -g mode-keys vi

bind v copy-mode                                      # prefix + v enters copy mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi V   send -X select-line
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel  # uses copy-command (pbcopy)
bind -T copy-mode-vi Escape send -X cancel

# ---------------------------------------------------------------------------
# Pane & Window Appearance
# ---------------------------------------------------------------------------
# Status bar at top (less intrusive, more visible)
set -g status-position top

# Pane borders
set -g pane-border-style "fg=#45475a"
set -g pane-active-border-style "fg=#89b4fa"
set -g pane-border-lines heavy

# Dim inactive panes slightly
set -g window-style "fg=#a6adc8"
set -g window-active-style "fg=#cdd6f4"

# ---------------------------------------------------------------------------
# Plugins (TPM)
# ---------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Session persistence across restarts
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Enhanced yank/copy
set -g @plugin 'tmux-plugins/tmux-yank'

# Theme: Catppuccin Mocha
set -g @plugin 'catppuccin/tmux#v2.1.3'

# ---------------------------------------------------------------------------
# Plugin Config
# ---------------------------------------------------------------------------
# Resurrect
set -g @resurrect-capture-pane-contents 'on'

# Continuum — auto-save every 15m, auto-restore on tmux start
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Yank
set -g @yank-selection 'clipboard'

# Catppuccin
set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_window_status_style 'rounded'

# Status bar modules
set -g @catppuccin_status_modules_right "application session date_time"
set -g @catppuccin_status_modules_left ""

# ---------------------------------------------------------------------------
# Initialize TPM (MUST be last line)
# ---------------------------------------------------------------------------
run '~/.tmux/plugins/tpm/tpm'
